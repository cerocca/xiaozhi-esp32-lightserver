# Copy this file to data/.config.yaml and replace every placeholder.
# Keep this example file in version control.
# Do not commit secrets from data/.config.yaml.

server:
  websocket: ws://<SERVER_IP>:8000/xiaozhi/v1/
  vision_explain: http://<SERVER_IP>:8003/mcp/vision/explain

selected_module:
  VAD: SileroVAD
  ASR: OpenaiASR
  LLM: AliLLM
  TTS: OpenAITTS
  Memory: nomem
  Intent: nointent

runtime:
  asr_profile: openai_asr
  llm_profile: openai_llm
  tts_profile: openai_tts

Intent:
  nointent:
    type: nointent

Memory:
  nomem:
    type: nomem

ASR:
  OpenaiASR:
    type: openai
  openai_asr:
    type: openai
    api_key: <OPENAI_API_KEY>
    base_url: https://api.openai.com/v1/audio/transcriptions
    model_name: gpt-4o-mini-transcribe
    output_dir: tmp/

LLM:
  AliLLM:
    type: openai
  openai_llm:
    type: openai
    api_key: <OPENAI_API_KEY>
    base_url: https://api.openai.com/v1
    model_name: gpt-4o-mini

TTS:
  OpenAITTS:
    type: openai
  openai_tts:
    type: openai
    api_key: <OPENAI_API_KEY>
    api_url: https://api.openai.com/v1/audio/speech
    model: tts-1
    voice: alloy
    speed: 1
    output_dir: tmp/

prompt: |
  You are a concise, natural voice assistant.
  Reply clearly and keep responses short unless the user asks for detail.

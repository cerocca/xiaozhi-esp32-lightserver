# Copy this file to data/.config.yaml and replace the placeholders you need.
# Only overrides belong here: the server merges this file on top of the built-in
# config at startup.
# Do not commit secrets from data/.config.yaml.
#
# First boot:
# 1. Copy .env.example to .env
# 2. Set SERVER_HOST in .env
# 3. Copy that same host/IP into the URLs below
# 4. Add your provider API key(s)
#
# SERVER_HOST from .env is not injected here automatically yet.
# If you change WS_PORT or HTTP_PORT in .env, update the URLs below too.

server:
  websocket: ws://<SERVER_HOST>:8000/xiaozhi/v1/
  vision_explain: http://<SERVER_HOST>:8003/mcp/vision/explain

selected_module:
  VAD: SileroVAD
  ASR: OpenaiASR
  LLM: AliLLM
  TTS: OpenAITTS
  Memory: nomem
  Intent: nointent

runtime:
  asr_profile: openai_asr
  llm_profile: openai_llm
  tts_profile: openai_tts

Intent:
  nointent:
    type: nointent

Memory:
  nomem:
    type: nomem

ASR:
  OpenaiASR:
    type: openai
  openai_asr:
    type: openai
    api_key: <OPENAI_API_KEY>
    base_url: https://api.openai.com/v1/audio/transcriptions
    model_name: gpt-4o-mini-transcribe
    output_dir: tmp/

LLM:
  AliLLM:
    type: openai
  openai_llm:
    type: openai
    api_key: <OPENAI_API_KEY>
    base_url: https://api.openai.com/v1
    model_name: gpt-4o-mini

TTS:
  OpenAITTS:
    type: openai
  openai_tts:
    type: openai
    api_key: <OPENAI_API_KEY>
    api_url: https://api.openai.com/v1/audio/speech
    model: tts-1
    # Example OpenAI voice for this example profile: alloy
    voice: alloy
    speed: 1
    output_dir: tmp/

prompt: |
  You are a concise, natural voice assistant.
  Reply clearly and keep responses short unless the user asks for detail.
